coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 60%
        threshold: 10%

comment:
  layout: "condensed_header, diff, flags, components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "apps/server/src/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "scripts/**"
  - "tests/**"
  - "platforms/**"
  - "packages/adapters/src/magento/**"
  - "packages/adapters/src/shopware/**"
  - "packages/adapters/src/shared/**"
