name: Shopware E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/adapters/src/shopware/**'
      - 'apps/server/src/routes/checkout.ts'
      - 'tests/e2e-shopware/**'

permissions:
  contents: read

jobs:
  shopware-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ucp
          POSTGRES_PASSWORD: ucp
          POSTGRES_DB: ucp
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U ucp -d ucp"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (core first, then adapters, then server)
        run: |
          npm run build -w packages/core
          npm run build -w packages/adapters
          npm run build -w apps/server

      - name: Start Shopware (dockware)
        run: |
          docker run -d \
            --name shopware \
            -p 8888:80 \
            dockware/dev:6.6.4.1
          echo "Waiting for dockware container to initialize..."

      - name: Setup Shopware (health check + seed products)
        run: bash tests/e2e-shopware/setup-shopware.sh
        env:
          SHOPWARE_URL: http://localhost:8888
          MAX_WAIT_SECONDS: 300

      - name: Seed UCP tenant
        run: bash tests/e2e-shopware/seed-tenant.sh
        env:
          SHOPWARE_URL: http://localhost:8888
          GATEWAY_PORT: 3000
          DB_HOST: localhost
          DB_PORT: '5433'
          REDIS_HOST: localhost
          REDIS_PORT: '6380'

      - name: Start UCP Gateway
        run: |
          DATABASE_URL="postgresql://ucp:ucp@localhost:5433/ucp" \
          REDIS_URL="redis://localhost:6380" \
          PORT=3000 \
          SECRET_KEY="e2e_test_secret_key_32_characters_" \
          NODE_ENV=development \
          LOG_LEVEL=debug \
          npx tsx apps/server/src/index.ts > /tmp/ucp-server.log 2>&1 &
          sleep 5
          curl -sf http://localhost:3000/health || (echo "Gateway failed to start" && cat /tmp/ucp-server.log && exit 1)
          echo "Gateway started. Testing profile endpoint..."
          curl -s http://localhost:3000/.well-known/ucp -H "UCP-Agent: test/1.0" | head -200

      - name: Run E2E checkout test
        run: bash tests/e2e-shopware/run-e2e-checkout.sh
        env:
          GATEWAY_URL: http://localhost:3000

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Gateway logs ==="
          cat /tmp/ucp-server.log 2>/dev/null | tail -100 || true
          echo "=== Shopware container logs ==="
          docker logs shopware 2>&1 | tail -30 || true
          echo "=== Tenant in DB ==="
          PGPASSWORD=ucp psql -h localhost -p 5433 -U ucp -d ucp -c "SELECT slug, domain, platform, adapter_config FROM tenants;" 2>/dev/null || true
          echo "=== Test profile endpoint ==="
          curl -s http://localhost:3000/.well-known/ucp -H "UCP-Agent: debug/1.0" 2>/dev/null | head -50 || true

      - name: Stop Shopware
        if: always()
        run: docker rm -f shopware || true
