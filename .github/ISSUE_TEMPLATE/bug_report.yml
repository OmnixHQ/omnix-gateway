name: Bug Report
description: Report a bug in UCP Gateway
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Send request to '...'
        2. With payload '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which adapter are you using?
      options:
        - MockAdapter
        - Magento
        - Shopware
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of UCP Gateway are you running?
      placeholder: e.g. 0.1.0
    validations:
      required: false
